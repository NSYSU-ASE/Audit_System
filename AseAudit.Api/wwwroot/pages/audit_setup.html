<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智慧資安稽核工具｜稽核設定</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --card: rgba(255,255,255,0.08);
            --card2: rgba(255,255,255,0.06);
            --stroke: rgba(255,255,255,0.14);
            --txt: rgba(255,255,255,0.92);
            --muted: rgba(255,255,255,0.62);
        }

        body {
            background: radial-gradient(1200px 600px at 20% 0%, rgba(99,102,241,.25), transparent 60%), radial-gradient(1200px 600px at 90% 30%, rgba(16,185,129,.18), transparent 55%), linear-gradient(180deg, #070b14 0%, #0b1220 60%, #070b14 100%);
            color: var(--txt);
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
        }

        .glass {
            background: var(--card);
            border: 1px solid var(--stroke);
            backdrop-filter: blur(12px);
            border-radius: 18px;
        }

        .glass-soft {
            background: var(--card2);
            border: 1px solid var(--stroke);
            backdrop-filter: blur(10px);
            border-radius: 16px;
        }

        .brand {
            font-weight: 900;
            letter-spacing: .5px;
        }

        .chip {
            padding: .35rem .7rem;
            border-radius: 999px;
            font-size: .85rem;
            border: 1px solid var(--stroke);
            background: rgba(255,255,255,.06);
            color: var(--muted);
            white-space: nowrap;
        }

        .mono {
            font-variant-numeric: tabular-nums;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .dark-field {
            background: rgba(0,0,0,.25) !important;
            border: 1px solid rgba(255,255,255,.18) !important;
            color: rgba(255,255,255,.92) !important;
        }

            .dark-field::placeholder {
                color: rgba(255,255,255,.45) !important;
            }

        .pill {
            border-radius: 999px;
        }

        .btn-primary {
            background: #2563eb;
            border-color: #2563eb;
            font-weight: 900;
        }

            .btn-primary:hover {
                background: #1d4ed8;
                border-color: #1d4ed8;
                transform: translateY(-1px);
            }

        .btn-ghost {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.14);
            color: rgba(255,255,255,.82);
        }

            .btn-ghost:hover {
                background: rgba(255,255,255,.09);
                color: rgba(255,255,255,.92);
            }

        /* FR 卡片 */
        .fr-card {
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
        }

            .fr-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 18px 60px rgba(0,0,0,.45);
                border-color: rgba(255,255,255,.22);
            }

        /* 類型標籤 */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.14);
            font-weight: 900;
            letter-spacing: .2px;
            white-space: nowrap;
            font-size: .88rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255,255,255,.05);
        }

        .tag-manual {
            background: rgba(250,204,21,.18);
            color: #fde68a;
        }

            .tag-manual .dot {
                background: #facc15;
            }

        .tag-photo {
            background: rgba(59,130,246,.20);
            color: #bfdbfe;
        }

            .tag-photo .dot {
                background: #3b82f6;
            }

        .tag-auto {
            background: rgba(16,185,129,.18);
            color: #a7f3d0;
        }

            .tag-auto .dot {
                background: #10b981;
            }

        /* Upload 區 */
        .upload-box {
            border: 1px dashed rgba(255,255,255,.22);
            background: rgba(255,255,255,.04);
            border-radius: 14px;
            padding: 14px;
        }

        .upload-hint {
            color: rgba(255,255,255,.55);
            font-size: .85rem;
        }

        /* 狀態小字 */
        .small-note {
            color: rgba(255,255,255,.55);
            font-size: .85rem;
        }

        .section-title {
            font-weight: 900;
            letter-spacing: .3px;
        }

        /* 右側摘要 */
        .summary-kpi {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.05);
        }

            .summary-kpi .num {
                font-size: 1.8rem;
                font-weight: 1000;
                line-height: 1;
            }

        /* checkbox 美化 */
        .form-check-input {
            background-color: rgba(0,0,0,.25);
            border: 1px solid rgba(255,255,255,.22);
        }

            .form-check-input:checked {
                background-color: #2563eb;
                border-color: #2563eb;
            }

        /* 讓 accordion 更一致 */
        .accordion-item {
            background: transparent;
            border: none;
        }

        .accordion-button {
            background: rgba(255,255,255,.06) !important;
            color: rgba(255,255,255,.92) !important;
            border: 1px solid rgba(255,255,255,.14) !important;
            border-radius: 16px !important;
            box-shadow: none !important;
            padding: 16px 16px;
        }

            .accordion-button:not(.collapsed) {
                border-color: rgba(255,255,255,.22) !important;
                background: rgba(255,255,255,.08) !important;
            }

        .accordion-body {
            padding: 14px 6px 6px;
        }

        .accordion-button::after {
            filter: invert(1);
            opacity: .75;
        }

        /* 每個 FR 內的控制項卡 */
        .ctrl-card {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 14px;
            padding: 12px;
        }

        .ctrl-title {
            font-weight: 900;
            letter-spacing: .2px;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,.10);
            margin: 12px 0;
        }
    </style>
</head>

<body>
    <div class="container py-4">

        <!-- Header -->
        <div class="glass p-3 px-lg-4 d-flex flex-wrap align-items-center justify-content-between gap-2">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-4 d-flex align-items-center justify-content-center"
                     style="width:44px;height:44px;background:rgba(99,102,241,.22);border:1px solid rgba(255,255,255,.14)">
                    <i class="bi bi-clipboard-data fs-4"></i>
                </div>
                <div>
                    <div class="brand fs-4">智慧資安稽核工具</div>
                    <div class="small-note">稽核設定（輸入資料 / 上傳證據 / 自動蒐集）</div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="chip"><i class="bi bi-buildings me-1"></i>棟別：<span id="buildingChip">--</span></span>
                <span class="chip"><i class="bi bi-person-circle me-1"></i><span id="loginUser">--</span></span>
                <a class="chip text-decoration-none" href="building_list.html"><i class="bi bi-arrow-left me-1"></i>回棟別</a>
                <!--<button class="chip btn btn-link p-0 text-decoration-none" onclick="logout()" style="color: rgba(255,255,255,.72);">-->
                <button class="chip btn btn-link p-0 text-decoration-none"  style="color: rgba(255,255,255,.72);">
                    <i class="bi bi-box-arrow-right me-1"></i>登出
                </button>
            </div>
        </div>

        <!-- Page content -->
        <div class="row g-3 mt-3">

            <!-- Left: main settings -->
            <div class="col-12 col-lg-8">

                <!-- 基本資訊 -->
                <div class="glass p-3 p-lg-4">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                        <div>
                            <div class="section-title fs-5">稽核基本資訊</div>
                            <div class="small-note">設定本次稽核範圍與時間，並選擇需要執行的項目。</div>
                        </div>
                        <span class="chip"><i class="bi bi-calendar3 me-1"></i>版本：2025-12</span>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-12 col-md-4">
                            <label class="small-note mb-1">稽核期間（起）</label>
                            <input type="date" class="form-control dark-field" id="auditStart">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="small-note mb-1">稽核期間（迄）</label>
                            <input type="date" class="form-control dark-field" id="auditEnd">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="small-note mb-1">稽核模式</label>
                            <select class="form-select dark-field" id="auditMode">
                                <option value="initial">初稽</option>
                                <option value="recheck">複稽</option>
                                <option value="spot">抽查</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="small-note mb-1">備註</label>
                            <input type="text" class="form-control dark-field" id="auditNote" placeholder="例如：本次針對 OT 網段 / 重要機台優先稽核...">
                        </div>
                    </div>
                </div>

                <!-- FR 設定（Accordion） -->
                <div class="glass p-3 p-lg-4 mt-3">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
                        <div>
                            <div class="section-title fs-5">稽核項目設定（FR1 ~ FR7）</div>
                            <div class="small-note">每個 FR 先假設 5 個控制項：可勾選、可上傳照片、或由系統自動蒐集。</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-ghost pill" type="button" onclick="selectAll(true)">
                                <i class="bi bi-check2-square me-1"></i>全選
                            </button>
                            <button class="btn btn-ghost pill" type="button" onclick="selectAll(false)">
                                <i class="bi bi-square me-1"></i>全不選
                            </button>
                        </div>
                    </div>

                    <div class="accordion mt-3" id="frAccordion"></div>
                </div>

                <!-- Bottom actions -->
                <div class="glass p-3 p-lg-4 mt-3 d-flex flex-wrap align-items-center justify-content-between gap-2">
                    <div class="small-note">
                        提示：目前為示意版（不接後端）。你之後可把設定 JSON 丟給 API，或存到資料庫。
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-ghost pill" onclick="previewJSON()">
                            <i class="bi bi-braces me-1"></i>預覽設定
                        </button>
                        <button class="btn btn-primary pill" onclick="saveAndGoIndex()">
                            <i class="bi bi-save2 me-1"></i>儲存並前往儀表板
                        </button>
                    </div>
                </div>

            </div>

            <!-- Right: summary -->
            <div class="col-12 col-lg-4">
                <div class="glass p-3 p-lg-4 h-100">
                    <div class="section-title fs-5">執行摘要</div>
                    <div class="small-note">快速掌握本次稽核啟用項目與證據需求。</div>

                    <div class="mt-3 summary-kpi">
                        <div>
                            <div class="small-note">已啟用控制項</div>
                            <div class="num mono" id="sumEnabled">0</div>
                        </div>
                        <i class="bi bi-check2-circle fs-3 text-white-50"></i>
                    </div>

                    <div class="mt-2 summary-kpi">
                        <div>
                            <div class="small-note">需要上傳照片</div>
                            <div class="num mono" id="sumPhoto">0</div>
                        </div>
                        <i class="bi bi-camera fs-3 text-white-50"></i>
                    </div>

                    <div class="mt-2 summary-kpi">
                        <div>
                            <div class="small-note">系統自動蒐集</div>
                            <div class="num mono" id="sumAuto">0</div>
                        </div>
                        <i class="bi bi-robot fs-3 text-white-50"></i>
                    </div>

                    <div class="divider"></div>

                    <div class="small-note mb-2">快速說明（類型）</div>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="tag tag-manual"><span class="dot"></span>需勾選/填寫</span>
                        <span class="tag tag-photo"><span class="dot"></span>需上傳照片</span>
                        <span class="tag tag-auto"><span class="dot"></span>自動蒐集</span>
                    </div>

                    <div class="divider"></div>

                    <div class="small-note mb-2">匯入/匯出（示意）</div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-ghost pill" onclick="importTemplate()">
                            <i class="bi bi-upload me-1"></i>匯入稽核設定（JSON）
                        </button>
                        <button class="btn btn-ghost pill" onclick="exportTemplate()">
                            <i class="bi bi-download me-1"></i>匯出稽核設定（JSON）
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Modal: JSON preview -->
    <div class="modal fade" id="jsonModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content text-bg-dark" style="border:1px solid rgba(255,255,255,.14); border-radius:16px;">
                <div class="modal-header border-light-subtle">
                    <h5 class="modal-title"><i class="bi bi-braces me-2"></i>稽核設定（JSON 預覽）</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="glass-soft p-3">
                        <pre class="mb-0 small mono" id="jsonBody" style="white-space: pre-wrap;"></pre>
                    </div>
                </div>
                <div class="modal-footer border-light-subtle">
                    <button class="btn btn-ghost pill" data-bs-dismiss="modal">關閉</button>
                    <button class="btn btn-primary pill" onclick="downloadJSON()">下載 JSON</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // // ===== 登入檢查 =====
        // const user = localStorage.getItem("ase_login_user");
        // if (!user) {
        //     location.href = "login.html";
        // }
        // document.getElementById("loginUser").textContent = user || "--";

        // function logout() {
        //     localStorage.removeItem("ase_login_user");
        //     location.href = "login.html";
        // }

        // ===== 讀棟別 =====
        const params = new URL(location.href).searchParams;
        const building = params.get("building") || localStorage.getItem("ase_selected_building") || "B1";
        localStorage.setItem("ase_selected_building", building);
        document.getElementById("buildingChip").textContent = building;

        // ===== 預設日期 =====
        (function initDates() {
            const start = document.getElementById("auditStart");
            const end = document.getElementById("auditEnd");
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, "0");
            const d = String(today.getDate()).padStart(2, "0");
            const iso = `${y}-${m}-${d}`;
            start.value = iso;
            end.value = iso;
        })();

        // ===== FR + 控制項資料（每個 FR 5 個 control）=====
        // type: manual（只勾選/填寫） / photo（需要上傳照片） / auto（系統自動蒐集）
        const FR_DATA = [
            {
                fr: "FR1", title: "身份與存取控制", controls: [
                    { id: "FR1-1", name: "帳號權限最小化", type: "manual", desc: "確認是否依職務分級，避免共用帳號。" },
                    { id: "FR1-2", name: "密碼政策", type: "photo", desc: "上傳密碼/群組原則截圖或設備畫面。" },
                    { id: "FR1-3", name: "遠端存取限制", type: "manual", desc: "確認遠端連線是否限制來源與權限。" },
                    { id: "FR1-4", name: "登入/登出紀錄", type: "auto", desc: "系統將透過腳本蒐集事件紀錄與登入軌跡。" },
                    { id: "FR1-5", name: "多因素驗證（MFA）", type: "photo", desc: "上傳 MFA 啟用畫面或設定截圖。" },
                ]
            },
            {
                fr: "FR2", title: "網路分割與防護", controls: [
                    { id: "FR2-1", name: "IT/OT 網路分段", type: "manual", desc: "確認 VLAN/ACL/Firewall 分段是否落實。" },
                    { id: "FR2-2", name: "防火牆規則檢核", type: "auto", desc: "系統自動擷取規則摘要與異常連線清單。" },
                    { id: "FR2-3", name: "白名單策略", type: "manual", desc: "確認通訊僅允許必要服務/必要端口。" },
                    { id: "FR2-4", name: "交換器/路由器配置", type: "photo", desc: "上傳設備介面配置截圖（關鍵頁即可）。" },
                    { id: "FR2-5", name: "外網連線管控", type: "manual", desc: "確認外連代理/跳板/封包檢測機制。" },
                ]
            },
            {
                fr: "FR3", title: "日誌與稽核追蹤", controls: [
                    { id: "FR3-1", name: "日誌集中保存", type: "manual", desc: "確認日誌是否集中至 SIEM / Log Server。" },
                    { id: "FR3-2", name: "稽核軌跡不可否認", type: "auto", desc: "系統將檢查日誌完整性與時間同步狀態。" },
                    { id: "FR3-3", name: "關鍵事件告警", type: "manual", desc: "是否對登入失敗/權限變更/異常連線告警。" },
                    { id: "FR3-4", name: "時間同步（NTP）", type: "photo", desc: "上傳 NTP 設定與同步狀態截圖。" },
                    { id: "FR3-5", name: "日誌留存期限", type: "manual", desc: "確認留存天數符合內規/法規要求。" },
                ]
            },
            {
                fr: "FR4", title: "遠端維運與變更管理", controls: [
                    { id: "FR4-1", name: "遠端維運流程", type: "manual", desc: "是否有申請/審核/記錄（含外包商）。" },
                    { id: "FR4-2", name: "跳板機/堡壘機", type: "photo", desc: "上傳跳板配置或登入控管畫面。" },
                    { id: "FR4-3", name: "變更紀錄", type: "manual", desc: "是否可追蹤設定變更與回復機制。" },
                    { id: "FR4-4", name: "遠端連線日誌", type: "auto", desc: "系統透過腳本蒐集遠端連線 session 紀錄。" },
                    { id: "FR4-5", name: "維運帳號管控", type: "manual", desc: "維運帳號是否分流、到期、可追溯。" },
                ]
            },
            {
                fr: "FR5", title: "資產盤點與標識", controls: [
                    { id: "FR5-1", name: "資產標籤與命名", type: "photo", desc: "上傳資產標籤照片或資產系統畫面。" },
                    { id: "FR5-2", name: "資產清單完整性", type: "manual", desc: "是否含型號/序號/位置/責任人/網段等。" },
                    { id: "FR5-3", name: "設備韌體/版本", type: "auto", desc: "系統將蒐集版本與補丁狀態摘要。" },
                    { id: "FR5-4", name: "責任歸屬", type: "manual", desc: "是否明確指定維護單位與負責人。" },
                    { id: "FR5-5", name: "關鍵資產分級", type: "manual", desc: "是否有關鍵性等級與優先修補策略。" },
                ]
            },
            {
                fr: "FR6", title: "惡意程式與端點防護", controls: [
                    { id: "FR6-1", name: "端點防護狀態", type: "auto", desc: "系統將蒐集防毒/EDR 狀態與異常事件。" },
                    { id: "FR6-2", name: "可攜式媒體管控", type: "manual", desc: "USB/外接裝置是否限制與記錄。" },
                    { id: "FR6-3", name: "白名單執行", type: "manual", desc: "應用程式白名單/執行管制是否啟用。" },
                    { id: "FR6-4", name: "隔離/封鎖策略", type: "manual", desc: "偵測後是否有隔離、封鎖與通報流程。" },
                    { id: "FR6-5", name: "防護設定證據", type: "photo", desc: "上傳端點防護政策/設定畫面截圖。" },
                ]
            },
            {
                fr: "FR7", title: "備援復原與營運韌性", controls: [
                    { id: "FR7-1", name: "備份策略與頻率", type: "manual", desc: "是否定期備份與驗證可還原性。" },
                    { id: "FR7-2", name: "備份/還原證據", type: "photo", desc: "上傳備份紀錄、排程或還原測試截圖。" },
                    { id: "FR7-3", name: "災難復原演練", type: "manual", desc: "是否有演練紀錄、缺失與改善追蹤。" },
                    { id: "FR7-4", name: "復原時間目標（RTO/RPO）", type: "manual", desc: "是否明確訂定並能量測符合。" },
                    { id: "FR7-5", name: "自動蒐集（備份狀態）", type: "auto", desc: "系統透過腳本查詢備份服務狀態/最近備份時間。" },
                ]
            },
        ];

        // ===== UI render =====
        const frAccordion = document.getElementById("frAccordion");

        function tagHTML(type) {
            if (type === "photo") return `<span class="tag tag-photo"><span class="dot"></span>需上傳照片</span>`;
            if (type === "auto") return `<span class="tag tag-auto"><span class="dot"></span>自動蒐集</span>`;
            return `<span class="tag tag-manual"><span class="dot"></span>需勾選/填寫</span>`;
        }

        function buildControlRow(frKey, c, idx) {
            const checkboxId = `chk_${c.id}`;
            const uploadId = `file_${c.id}`;
            const noteId = `note_${c.id}`;

            const uploadBlock = (c.type === "photo") ? `
          <div class="upload-box mt-2">
            <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
              <div class="upload-hint">
                <i class="bi bi-camera me-1"></i>請上傳證據照片/截圖（可多張）
              </div>
              <label class="btn btn-ghost pill btn-sm mb-0" for="${uploadId}">
                <i class="bi bi-upload me-1"></i>選擇檔案
              </label>
              <input class="form-control d-none" type="file" id="${uploadId}" accept="image/*" multiple>
            </div>
            <div class="small-note mt-2" id="${uploadId}_hint">尚未選擇檔案</div>
          </div>
        ` : "";

            const autoHint = (c.type === "auto") ? `
          <div class="upload-box mt-2">
            <div class="upload-hint">
              <i class="bi bi-robot me-1"></i>此控制項由系統自動蒐集資料，無需人工操作。
            </div>
          </div>
        ` : "";

            return `
          <div class="ctrl-card">
            <div class="d-flex align-items-start justify-content-between gap-2 flex-wrap">
              <div>
                <div class="ctrl-title">${c.name}</div>
                <div class="small-note mt-1">${c.desc}</div>
              </div>
              ${tagHTML(c.type)}
            </div>

            <div class="divider"></div>

            <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
              <div class="form-check">
                <input class="form-check-input audit-check" type="checkbox"
                       data-type="${c.type}" data-fr="${frKey}" id="${checkboxId}" checked>
                <label class="form-check-label" for="${checkboxId}">
                  需要執行此控制項
                </label>
              </div>

              <span class="chip"><i class="bi bi-hash me-1"></i>${c.id}</span>
            </div>

            ${uploadBlock}
            ${autoHint}

            <div class="mt-2">
              <label class="small-note mb-1">備註（可選）</label>
              <input type="text" class="form-control dark-field"
                     id="${noteId}" placeholder="例如：已完成設定；證據存放於...">
            </div>
          </div>
        `;
        }

        function renderFR() {
            frAccordion.innerHTML = FR_DATA.map((frItem, i) => {
                const cid = `collapse_${frItem.fr}`;
                return `
            <div class="accordion-item mb-2">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed fr-card" type="button"
                        data-bs-toggle="collapse" data-bs-target="#${cid}">
                  <div class="w-100 d-flex align-items-center justify-content-between gap-2 flex-wrap">
                    <div class="d-flex align-items-center gap-2">
                      <span class="chip"><i class="bi bi-diagram-3 me-1"></i>${frItem.fr}</span>
                      <div class="fw-bold">${frItem.title}</div>
                    </div>
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                      <button class="btn btn-ghost pill btn-sm" type="button"
                              onclick="toggleFR('${frItem.fr}', true); event.stopPropagation();">
                        全選
                      </button>
                      <button class="btn btn-ghost pill btn-sm" type="button"
                              onclick="toggleFR('${frItem.fr}', false); event.stopPropagation();">
                        全不選
                      </button>
                    </div>
                  </div>
                </button>
              </h2>

              <div id="${cid}" class="accordion-collapse collapse" data-bs-parent="#frAccordion">
                <div class="accordion-body">
                  <div class="row g-3">
                    ${frItem.controls.map((c, idx) => `
                      <div class="col-12">
                        ${buildControlRow(frItem.fr, c, idx)}
                      </div>
                    `).join("")}
                  </div>
                </div>
              </div>
            </div>
          `;
            }).join("");

            wireUploads();
            updateSummary();
            wireEnableLogic();
        }

        // ===== checkbox 邏輯：未勾選 -> 相關輸入（照片/備註）變灰/停用 =====
        function wireEnableLogic() {
            document.querySelectorAll(".audit-check").forEach(chk => {
                const handler = () => {
                    const id = chk.id.replace("chk_", "");
                    const file = document.getElementById(`file_${id}`);
                    const note = document.getElementById(`note_${id}`);
                    const wrap = chk.closest(".ctrl-card");

                    const enabled = chk.checked;
                    if (file) file.disabled = !enabled;
                    if (note) note.disabled = !enabled;

                    wrap.style.opacity = enabled ? "1" : ".55";
                };
                chk.addEventListener("change", () => {
                    handler();
                    updateSummary();
                });
                handler();
            });
        }

        // ===== upload 顯示檔名 =====
        function wireUploads() {
            FR_DATA.flatMap(x => x.controls).forEach(c => {
                const el = document.getElementById(`file_${c.id}`);
                if (!el) return;
                el.addEventListener("change", () => {
                    const hint = document.getElementById(`file_${c.id}_hint`);
                    if (!el.files || el.files.length === 0) {
                        hint.textContent = "尚未選擇檔案";
                        return;
                    }
                    hint.textContent = `已選擇 ${el.files.length} 個檔案：` + Array.from(el.files).map(f => f.name).join(", ");
                });
            });
        }

        // ===== summary =====
        function updateSummary() {
            const checks = Array.from(document.querySelectorAll(".audit-check"));
            const enabled = checks.filter(c => c.checked);

            const photoEnabled = enabled.filter(c => c.dataset.type === "photo").length;
            const autoEnabled = enabled.filter(c => c.dataset.type === "auto").length;

            document.getElementById("sumEnabled").textContent = enabled.length;
            document.getElementById("sumPhoto").textContent = photoEnabled;
            document.getElementById("sumAuto").textContent = autoEnabled;
        }

        // ===== 全選/全不選（全部 FR）=====
        function selectAll(on) {
            document.querySelectorAll(".audit-check").forEach(chk => {
                chk.checked = on;
                chk.dispatchEvent(new Event("change"));
            });
        }

        // ===== 全選/全不選（單一 FR）=====
        function toggleFR(frKey, on) {
            document.querySelectorAll(`.audit-check[data-fr="${frKey}"]`).forEach(chk => {
                chk.checked = on;
                chk.dispatchEvent(new Event("change"));
            });
        }

        // ===== 組合設定 JSON =====
        function collectConfig() {
            const config = {
                building,
                user,
                audit: {
                    start: document.getElementById("auditStart").value,
                    end: document.getElementById("auditEnd").value,
                    mode: document.getElementById("auditMode").value,
                    note: document.getElementById("auditNote").value.trim()
                },
                fr: {}
            };

            FR_DATA.forEach(frItem => {
                config.fr[frItem.fr] = frItem.controls.map(c => {
                    const checked = document.getElementById(`chk_${c.id}`)?.checked ?? false;
                    const note = document.getElementById(`note_${c.id}`)?.value?.trim() ?? "";
                    const files = document.getElementById(`file_${c.id}`)?.files ?? null;

                    // 注意：前端無法直接把圖片內容塞進 JSON（會太大），這裡只記錄檔名（示意）
                    const fileNames = files ? Array.from(files).map(f => f.name) : [];

                    return {
                        controlId: c.id,
                        name: c.name,
                        type: c.type,
                        enabled: checked,
                        note,
                        evidenceFiles: fileNames
                    };
                });
            });

            return config;
        }

        // ===== JSON 預覽 =====
        let lastConfigForDownload = null;

        function previewJSON() {
            const cfg = collectConfig();
            lastConfigForDownload = cfg;

            document.getElementById("jsonBody").textContent = JSON.stringify(cfg, null, 2);
            const modal = new bootstrap.Modal(document.getElementById("jsonModal"));
            modal.show();
        }

        function downloadJSON() {
            const cfg = lastConfigForDownload || collectConfig();
            const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: "application/json;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `audit_setup_${building}.json`;
            document.body.appendChild(a);
            a.click();
            URL.revokeObjectURL(a.href);
            a.remove();
        }

        // ===== 儲存並前往 index（示意：存 localStorage）=====
        function saveAndGoIndex() {
            const cfg = collectConfig();
            localStorage.setItem("ase_audit_setup", JSON.stringify(cfg));
            // 帶棟別回 index
            location.href = `index.html?building=${encodeURIComponent(building)}`;
        }

        // ===== 匯入/匯出（示意）=====
        function exportTemplate() {
            previewJSON();
        }

        function importTemplate() {
            // 用檔案選擇匯入 JSON（示意）
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "application/json";
            input.onchange = async () => {
                const file = input.files?.[0];
                if (!file) return;

                try {
                    const text = await file.text();
                    const cfg = JSON.parse(text);

                    // 基本欄位
                    if (cfg.audit) {
                        if (cfg.audit.start) document.getElementById("auditStart").value = cfg.audit.start;
                        if (cfg.audit.end) document.getElementById("auditEnd").value = cfg.audit.end;
                        if (cfg.audit.mode) document.getElementById("auditMode").value = cfg.audit.mode;
                        if (typeof cfg.audit.note === "string") document.getElementById("auditNote").value = cfg.audit.note;
                    }

                    // controls：只同步 enabled / note（檔案無法自動灌回 input file）
                    if (cfg.fr) {
                        Object.keys(cfg.fr).forEach(frKey => {
                            const arr = cfg.fr[frKey] || [];
                            arr.forEach(item => {
                                const cid = item.controlId;
                                const chk = document.getElementById(`chk_${cid}`);
                                const note = document.getElementById(`note_${cid}`);
                                if (chk && typeof item.enabled === "boolean") {
                                    chk.checked = item.enabled;
                                    chk.dispatchEvent(new Event("change"));
                                }
                                if (note && typeof item.note === "string") {
                                    note.value = item.note;
                                }
                            });
                        });
                    }

                    updateSummary();
                } catch (e) {
                    alert("JSON 格式錯誤或內容不符合預期");
                }
            };
            input.click();
        }

        // ===== init =====
        renderFR();
    </script>
</body>
</html>
