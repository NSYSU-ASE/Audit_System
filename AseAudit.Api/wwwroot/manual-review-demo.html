<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Manual Review Demo</title>
    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            margin: 24px;
        }

        .toolbar {
            margin-bottom: 16px;
        }

        input, button {
            padding: 8px 12px;
            font-size: 16px;
        }

        #meta {
            margin: 16px 0;
            padding: 12px;
            background: #f5f5f5;
            border: 1px solid #ccc;
        }

        #viewer {
            margin-top: 20px;
            border: 1px solid #ccc;
            min-height: 500px;
            padding: 12px;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>人工審查模組 Demo</h1>

    <div class="toolbar">
        <input id="deviceIdInput" value="SCADA-001" />
        <button onclick="loadReviewFile()">讀取文件</button>
    </div>

    <div id="meta">尚未讀取文件</div>
    <div id="viewer">請輸入 deviceId 後點擊讀取文件</div>

    <script>
    async function loadReviewFile() {
      const deviceId = document.getElementById("deviceIdInput").value.trim();
      const meta = document.getElementById("meta");
      const viewer = document.getElementById("viewer");

      if (!deviceId) {
        meta.innerHTML = "請先輸入 deviceId";
        viewer.innerHTML = "";
        return;
      }

      const res = await fetch(`/api/manual-review/${deviceId}`);

      if (!res.ok) {
        meta.innerHTML = `找不到 deviceId = ${deviceId} 的文件`;
        viewer.innerHTML = "";
        return;
      }

      const data = await res.json();

      meta.innerHTML = `
        <div><strong>設備編號：</strong>${data.deviceId}</div>
        <div><strong>檔名：</strong>${data.fileName}</div>
        <div><strong>類型：</strong>${data.displayTypeText}</div>
        <div><strong>連結：</strong><a href="${data.fileUrl}" target="_blank">開啟原始檔</a></div>
      `;

      if (data.contentType === 1) {
        viewer.innerHTML = `<iframe src="${data.fileUrl}"></iframe>`;
      } else if (data.contentType === 2) {
        viewer.innerHTML = `<img src="${data.fileUrl}" alt="${data.fileName}" />`;
      } else {
        viewer.innerHTML = `<a href="${data.fileUrl}" target="_blank">開啟文件</a>`;
      }
    }
    </script>
</body>
</html>
